<div class="form-container">
  <h2>Cargar nuevo producto</h2>

  <div *ngIf="mensajeExito" class="mensaje-exito">{{ mensajeExito }}</div>
  <div *ngIf="mensajeError" class="mensaje-error">{{ mensajeError }}</div>

  <app-producto-form
    textoBoton="Crear producto"
    (enviar)="crear($event)">
  </app-producto-form>
</div>
