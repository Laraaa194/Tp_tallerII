
        <form [formGroup]="form" (ngSubmit)="validarEnvio()" class="login-form">
  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label login-form-label">Email</label>
    <input type="email" formControlName="email" class="form-control login-form-input" id="exampleInputEmail1" aria-describedby="email">
    @if (isEmailInvalid) {
            <span class="text-danger form-mensaje-error">Email invalido</span>
          }
  </div>
  <div class="mb-3">
    <label for="exampleInputPassword1" class="form-label login-form-label">Contraseña</label>
    <input type="password"  formControlName="password" class="form-control login-form-input" id="exampleInputPassword1" aria-describedby="contraseña">
    @if (isPasswordInvalid) {
            <span class="text-danger form-mensaje-error">Contraseña invalida</span>
          }
  </div>
  <button type="submit" class="btn btn-primary login-btn w-100 mt-3" [ngClass]="{'disabled': !formValido}" [disabled]="!formValido">Continuar</button>

</form>
