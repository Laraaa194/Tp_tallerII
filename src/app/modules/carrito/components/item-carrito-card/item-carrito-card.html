<div class="carrito-item">
 
  <div class="carrito-item__img-wrapper">
    <img
      [src]="'images/productos/' + item.imagenUrl || 'assets/img/placeholder-producto.png'"
      [alt]="item.nombre"
      class="carrito-item__img"
    />
  </div>
 
  <div class="carrito-item__info">
    <h3 class="carrito-item__nombre">{{ item.nombre }}</h3>
    @if (item.categoria) {
      <span class="carrito-item__categoria">{{ item.categoria }}</span>
    }
    <p class="carrito-item__precio-unitario">Precio unitario: ${{ item.precio }}</p>
  </div>
 
  <div class="carrito-item__cantidad">
    <button
      class="carrito-item__btn-cantidad"
      (click)="onDecrementar()"
      [disabled]="item.cantidad <= 1"
      aria-label="Disminuir cantidad"
    >
      −
    </button>
 
    <span class="carrito-item__cantidad-valor">{{ item.cantidad }}</span>
 
    <button
      class="carrito-item__btn-cantidad"
      (click)="onIncrementar()"
      [disabled]="item.cantidad >= item.stock"
      aria-label="Aumentar cantidad"
    >
      +
    </button>
  </div>
 
  <div class="carrito-item__subtotal">
    ${{ item.precio * item.cantidad }}
  </div>
 
  <button
    class="carrito-item__btn-eliminar"
    (click)="onEliminar()"
    aria-label="Eliminar producto del carrito"
    title="Eliminar"
  >
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3 6 5 6 21 6"></polyline>
      <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m5 0V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"></path>
      <line x1="10" y1="11" x2="10" y2="17"></line>
      <line x1="14" y1="11" x2="14" y2="17"></line>
    </svg>
  </button>
 
</div>
